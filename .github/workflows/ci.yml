name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Xlings
        env:
          XLINGS_NON_INTERACTIVE: 1
        run: |
          curl -fsSL https://raw.githubusercontent.com/d2learn/xlings/main/tools/other/quick_install.sh | bash
          echo "XLINGS_HOME=$HOME/.xlings" >> "$GITHUB_ENV"
          echo "$HOME/.xlings/subos/current/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: xlings install

      - name: Build
        run: xmake build -a -y

      - name: Test
        run: |
          xmake run test_types -y
          xmake run test_serialization -y
          xmake run test_coro -y
          xmake run test_client -y
          xmake run test_openai_serialize -y
          xmake run test_anthropic_serialize -y
          xmake run test_llmapi_integration -y

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Xlings
        env:
          XLINGS_NON_INTERACTIVE: 1
        run: |
          curl -fsSL https://raw.githubusercontent.com/d2learn/xlings/main/tools/other/quick_install.sh | bash
          echo "XLINGS_HOME=$HOME/.xlings" >> "$GITHUB_ENV"
          echo "$HOME/.xlings/subos/current/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: xlings install

      - name: Build
        run: xmake build -a -y

      - name: Test
        run: |
          xmake run test_types -y
          xmake run test_serialization -y
          xmake run test_coro -y
          xmake run test_client -y
          xmake run test_openai_serialize -y
          xmake run test_anthropic_serialize -y
          xmake run test_llmapi_integration -y

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Xlings
        env:
          XLINGS_NON_INTERACTIVE: "1"
        shell: pwsh
        run: |
          irm https://raw.githubusercontent.com/d2learn/xlings/main/tools/other/quick_install.ps1 | iex
          echo "XLINGS_HOME=$env:USERPROFILE\.xlings" >> $env:GITHUB_ENV
          echo "$env:USERPROFILE\.xlings\subos\current\bin" >> $env:GITHUB_PATH

      - name: Install dependencies
        run: xlings install

      - name: Build
        run: xmake build -a -y

      - name: Test
        run: |
          xmake run test_types -y
          xmake run test_serialization -y
          xmake run test_coro -y
          xmake run test_client -y
          xmake run test_openai_serialize -y
          xmake run test_anthropic_serialize -y
          xmake run test_llmapi_integration -y
